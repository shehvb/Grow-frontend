                $ref: '#/components/schemas/NotificationListResponse'
              examples:
                NotificationListResponse:
                  value:
                    unread_count: 2
                    results:
                    - id: 10
                      title: Your submission was graded
                      body: 'Your submission for ''Lab Report'' in ''Biology'' has
                        been graded. Score: 87/100.'
                      event_type: submission_graded
                      is_read: false
                      created_at: '2026-04-10T15:00:00Z'
                    - id: 9
                      title: 'New Assignment: Math Quiz'
                      body: 'A new assignment has been posted in ''Mathematics''.
                        Due: 2026-05-01.'
                      event_type: assignment_created
                      is_read: true
                      created_at: '2026-04-08T09:00:00Z'
