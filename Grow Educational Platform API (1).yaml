  /api/v1/submissions/{submission_pk}/grade/:
    post:
      operationId: submissions_grade_create
      description: |-
        **Teachers only.** Assign a numeric score and optional feedback to a student submission.

        **Rules:**
        - The submission must belong to a course the teacher owns.
        - A submission can only be graded once (raises `409` if already graded).

        **Side effects on success:**
        - Submission `status` changes to `graded`.
        - `submission_graded` event is emitted.
        - Student receives an in-app notification.
        - Any linked parent also receives a notification.
      summary: Grade a submission
      parameters:
      - in: path
        name: submission_pk
        schema:
          type: integer
        required: true
      tags:
      - Grades
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeWriteRequest'
            examples:
              GradeSubmission:
                value:
                  score: 87.5
                  feedback: Good analysis, but the conclusion needs more detail.
                summary: Grade Submission
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GradeWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/GradeWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grade'
              examples:
                GradeResponse:
                  value:
                    id: 5
                    submission: 12
                    score: '87.50'
                    feedback: Good analysis, but the conclusion needs more detail.
                    graded_by: 2
                    graded_at: '2026-04-10T15:00:00Z'
                  summary: Grade Response
          description: Grade assigned successfully.
        '400':
          description: Validation error (e.g. score out of range).
        '403':
          description: You do not own this submission's course.
        '404':
          description: Submission not found.
        '409':
          description: This submission is already graded.
