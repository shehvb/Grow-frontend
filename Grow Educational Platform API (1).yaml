components:
  schemas:
    AddStudentRequest:
      type: object
      properties:
        student_id:
          type: string
          minLength: 1
        parent_access_code:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - parent_access_code
      - student_id
    Analytics:
      type: object
      properties:
        overall_academic_trend:
          type: array
          items:
            $ref: '#/components/schemas/TrendPoint'
        study_hours:
          type: array
          items:
            $ref: '#/components/schemas/StudyHoursPoint'
        subject_breakdown:
          type: array
          items:
            $ref: '#/components/schemas/SubjectBreakdown'
      required:
      - overall_academic_trend
      - study_hours
      - subject_breakdown
    AnswerRequest:
      type: object
      properties:
        question_id:
          type: integer
        answer:
          type: string
          minLength: 1
      required:
      - answer
      - question_id
    Assignment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique assignment ID.
        course:
          type: integer
          readOnly: true
          description: ID of the parent course.
        title:
          type: string
          description: Assignment title.
        description:
          type: string
          description: Full instructions for the assignment.
        due_date:
          type: string
          format: date-time
          description: Submission deadline (ISO-8601). Students cannot submit after
            this time.
        created_by:
          type: integer
          readOnly: true
          description: Teacher who created the assignment.
        xp_reward:
          type: integer
          readOnly: true
          description: XP reward for completing this assignment.
        late_penalty_xp:
          type: integer
          readOnly: true
          description: XP deducted for late submissions.
        max_score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
          description: Maximum possible score.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp.
      required:
      - course
      - created_at
      - created_by
      - due_date
      - id
      - late_penalty_xp
      - max_score
      - title
      - xp_reward
    AssignmentBrief:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        deadline:
          type: string
          format: date-time
      required:
      - deadline
      - id
      - title
    AssignmentDetail:
      type: object
      properties:
        title:
          type: string
        deadline:
          type: string
          format: date-time
        xp_reward:
          type: integer
          nullable: true
        teacher_file_url:
          type: string
          format: uri
          nullable: true
        submission_status:
          type: string
      required:
      - deadline
      - submission_status
      - teacher_file_url
      - title
      - xp_reward
    AssignmentSubmitRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
      - file
    AssignmentSummary:
      type: object
      properties:
        total:
          type: integer
        submitted:
          type: integer
        missing:
          type: integer
      required:
      - missing
      - submitted
      - total
    AssignmentWriteRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          description: Short descriptive title for the assignment.
          maxLength: 255
        description:
          type: string
          description: Detailed instructions, rubric, or references.
        due_date:
          type: string
          format: date-time
          description: 'Deadline in ISO-8601 format (UTC). Example: 2026-05-01T23:59:00Z'
      required:
      - due_date
      - title
    Attendance:
      type: object
      properties:
        total_study_hours:
          type: number
          format: double
        study_streak:
          type: integer
        attendance_rate:
          type: number
          format: double
        activity_calendar:
          type: array
          items:
            $ref: '#/components/schemas/CalendarDay'
      required:
      - activity_calendar
      - attendance_rate
      - study_streak
      - total_study_hours
    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique attendance record ID.
        course:
          type: integer
          readOnly: true
          description: Course ID.
        student:
          type: integer
          readOnly: true
          description: Student user ID.
        date:
          type: string
          format: date
          description: Attendance date (YYYY-MM-DD).
        status:
          allOf:
          - $ref: '#/components/schemas/AttendanceStatusEnum'
          description: |-
            Attendance status: `present`, `absent`, or `late`.

            * `present` - Present
            * `absent` - Absent
            * `late` - Late
        marked_by:
          type: integer
          readOnly: true
          description: Teacher who marked the attendance.
      required:
      - course
      - date
      - id
      - marked_by
      - status
      - student
    AttendanceRecordInputRequest:
      type: object
      properties:
        student_id:
          type: integer
          description: ID of the student.
        status:
          allOf:
          - $ref: '#/components/schemas/AttendanceStatusEnum'
          description: |-
            Attendance status for this student.

            * `present` - Present
            * `absent` - Absent
            * `late` - Late
      required:
      - status
      - student_id
    AttendanceResult:
      type: object
      properties:
        status:
          type: string
          description: 'Attendance status: present, late, or absent.'
        date:
          type: string
          format: date
          description: Date of the attendance.
        is_new:
          type: boolean
          description: True if this is a new attendance record.
      required:
      - date
      - is_new
      - status
    AttendanceStatusEnum:
      enum:
      - present
      - absent
      - late
      type: string
      description: |-
        * `present` - Present
        * `absent` - Absent
        * `late` - Late
    CalendarDay:
      type: object
      properties:
        date:
          type: string
        status:
          type: string
      required:
      - date
      - status
    ChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
          description: Current password.
        new_password:
          type: string
          writeOnly: true
          minLength: 8
          description: New password (minimum 8 characters).
      required:
      - new_password
      - old_password
    ChatRequestRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 1000
      required:
      - message
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
      required:
      - reply
    ClassCard:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        teacher:
          type: object
          additionalProperties: {}
          readOnly: true
        enrollment_count:
          type: integer
        target_capacity:
          type: integer
        capacity_utilization:
          type: number
