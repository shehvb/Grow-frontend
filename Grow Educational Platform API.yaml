      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          description: No response body
components:
  schemas:
    Assignment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique assignment ID.
        course:
          type: integer
          readOnly: true
          description: ID of the parent course.
        title:
          type: string
          description: Assignment title.
        description:
          type: string
          description: Full instructions for the assignment.
        due_date:
          type: string
          format: date-time
          description: Submission deadline (ISO-8601). Students cannot submit after
            this time.
        created_by:
          type: integer
          readOnly: true
          description: Teacher who created the assignment.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Creation timestamp.
      required:
      - course
      - created_at
      - created_by
      - due_date
      - id
      - title
    AssignmentWriteRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          description: Short descriptive title for the assignment.
          maxLength: 255
        description:
          type: string
          description: Detailed instructions, rubric, or references.
        due_date:
          type: string
          format: date-time
          description: 'Deadline in ISO-8601 format (UTC). Example: 2026-05-01T23:59:00Z'
      required:
      - due_date
      - title
    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique attendance record ID.
        course:
          type: integer
          readOnly: true
          description: Course ID.
        student:
          type: integer
          readOnly: true
          description: Student user ID.
        date:
          type: string
          format: date
          description: Attendance date (YYYY-MM-DD).
        status:
          allOf:
          - $ref: '#/components/schemas/AttendanceStatusEnum'
          description: |-
            Attendance status: `present`, `absent`, or `late`.

            * `present` - Present
            * `absent` - Absent
            * `late` - Late
        marked_by:
          type: integer
          readOnly: true
          description: Teacher who marked the attendance.
      required:
      - course
      - date
      - id
      - marked_by
      - status
      - student
    AttendanceRecordInputRequest:
      type: object
      properties:
        student_id:
          type: integer
          description: ID of the student.
        status:
          allOf:
          - $ref: '#/components/schemas/AttendanceStatusEnum'
          description: |-
            Attendance status for this student.

            * `present` - Present
            * `absent` - Absent
            * `late` - Late
      required:
      - status
      - student_id
    AttendanceResult:
      type: object
      properties:
        status:
          type: string
          description: 'Attendance status: present, late, or absent.'
        date:
          type: string
          format: date
          description: Date of the attendance.
        is_new:
          type: boolean
          description: True if this is a new attendance record.
      required:
      - date
      - is_new
      - status
    AttendanceStatusEnum:
      enum:
      - present
      - absent
      - late
      type: string
      description: |-
        * `present` - Present
        * `absent` - Absent
        * `late` - Late
    ChangePasswordRequest:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
          description: Current password.
        new_password:
          type: string
          writeOnly: true
          minLength: 8
          description: New password (minimum 8 characters).
      required:
      - new_password
      - old_password
    Course:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique course ID.
        title:
          type: string
          description: Course title.
        description:
          type: string
          description: Course overview shown to students.
        teacher:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
          description: Teacher who owns the course.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Course creation timestamp.
      required:
      - created_at
      - id
      - teacher
      - title
    CourseWriteRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          description: Course title (required).
          maxLength: 255
        description:
          type: string
          description: Optional course description.
      required:
      - title
    Dashboard:
      type: object
      properties:
        gpa:
          type: object
          additionalProperties: {}
        study_hours:
          type: object
          additionalProperties: {}
        engagement:
          type: integer
        subjects:
          type: array
          items: {}
        recent_activity:
          type: array
          items: {}
      required:
      - engagement
      - gpa
      - recent_activity
      - study_hours
      - subjects
    Enrollment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Enrollment record ID.
        student:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
          description: The enrolled student.
        enrolled_at:
          type: string
          format: date-time
          readOnly: true
          description: Enrollment timestamp.
      required:
      - enrolled_at
      - id
      - student
    EnrollmentCode:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        token:
          type: string
          format: uuid
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/EnrollmentCodeStatusEnum'
          readOnly: true
        used_by:
          allOf:
          - $ref: '#/components/schemas/_BriefUser'
          readOnly: true
        used_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        revoked_by:
          allOf:
          - $ref: '#/components/schemas/_BriefUser'
          readOnly: true
        revoked_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - revoked_at
      - revoked_by
      - status
      - token
      - used_at
      - used_by
    EnrollmentCodeStatusEnum:
      enum:
      - available
      - used
      - revoked
      type: string
      description: |-
        * `available` - Available
        * `used` - Used
        * `revoked` - Revoked
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: Email address associated with the account.
      required:
      - email
    GPA:
      type: object
      properties:
        student_id:
          type: integer
        gpa:
          type: number
          format: double
        graded_count:
          type: integer
      required:
      - gpa
      - graded_count
      - student_id
    GenerateCodesRequest:
      type: object
      properties:
        quantity:
          type: integer
          minimum: 1
          description: Number of enrollment codes to generate (must be ≥ 1).
      required:
      - quantity
    Grade:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique grade record ID.
        submission:
          type: integer
          readOnly: true
          description: ID of the graded submission.
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          description: Numeric score between 0.00 and 100.00.
        feedback:
          type: string
          description: Optional teacher comment or feedback for the student.
        graded_by:
          type: integer
          readOnly: true
          description: ID of the teacher who graded the submission.
        graded_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the grade was assigned.
      required:
      - feedback
      - graded_at
      - graded_by
      - id
      - score
      - submission
    GradeWriteRequest:
      type: object
      properties:
        score:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          description: Score to assign (0.00 – 100.00).
        feedback:
          type: string
          default: ''
          description: Optional written feedback for the student.
      required:
      - score
    Lesson:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique lesson ID.
        title:
          type: string
          description: Lesson title.
          maxLength: 255
        content:
          type: string
          description: Full lesson body (supports plain text or Markdown).
        order:
          type: integer
          default: 0
          description: Display order within the course. Lower numbers appear first.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Lesson creation timestamp.
      required:
      - content
      - created_at
      - id
      - title
    LessonAttendanceSummary:
      type: object
      properties:
        lesson_id:
          type: integer
          description: Lesson ID.
        lesson_title:
          type: string
          description: Lesson title.
        total_enrolled:
          type: integer
          description: Total number of enrolled students.
        attendance:
          type: array
          items:
            $ref: '#/components/schemas/StudentAttendance'
          description: List of student attendance records.
      required:
      - attendance
      - lesson_id
      - lesson_title
      - total_enrolled
    LessonRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          description: Lesson title.
          maxLength: 255
        content:
          type: string
          minLength: 1
          description: Full lesson body (supports plain text or Markdown).
        order:
          type: integer
          default: 0
          description: Display order within the course. Lower numbers appear first.
      required:
      - content
      - title
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: Registered email address.
        password:
          type: string
          writeOnly: true
          minLength: 1
          description: Account password.
      required:
      - email
      - password
    LoginResponse:
      type: object
      properties:
        access:
          type: string
          description: 'JWT access token. Valid for 60 minutes. Send as `Authorization:
            Bearer <token>`.'
        refresh:
          type: string
          description: JWT refresh token. Valid for 7 days. Use to obtain a new access
            token.
        user:
          allOf:
          - $ref: '#/components/schemas/User'
          description: Authenticated user details.
      required:
      - access
      - refresh
      - user
    LogoutRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
          description: JWT refresh token to blacklist.
      required:
      - refresh
    MarkAllReadResponse:
      type: object
      description: Response for POST /notifications/read-all/
      properties:
        marked_read:
          type: integer
          description: Number of notifications that were marked as read by this operation.
      required:
      - marked_read
    MarkAttendanceRequest:
      type: object
      properties:
        course:
          type: integer
          description: ID of the course for which attendance is being marked.
        date:
          type: string
          format: date
          description: Date of the class session (YYYY-MM-DD).
        records:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecordInputRequest'
          description: List of per-student attendance entries. One entry per enrolled
            student.
      required:
      - course
      - date
      - records
    Membership:
      type: object
      properties:
        school:
          allOf:
          - $ref: '#/components/schemas/_BriefSchool'
          readOnly: true
        role:
          $ref: '#/components/schemas/MembershipRoleEnum'
        joined_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - joined_at
      - role
      - school
    MembershipRoleEnum:
      enum:
      - student
      - teacher
      - admin
      type: string
      description: |-
        * `student` - Student
        * `teacher` - Teacher
        * `admin` - Admin
    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique notification ID.
        title:
          type: string
          readOnly: true
          description: Short notification headline.
        body:
          type: string
          readOnly: true
          description: Full notification message body.
        event_type:
          type: string
          readOnly: true
          description: 'The domain event that triggered this notification. One of:
            `assignment_created`, `submission_created`, `submission_graded`, `attendance_marked`,
            `enrollment_created`.'
        is_read:
          type: boolean
          readOnly: true
          description: Whether the user has read this notification.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the notification was generated.
      required:
      - body
      - created_at
      - event_type
      - id
      - is_read
      - title
    NotificationListResponse:
      type: object
      description: Response envelope for GET /notifications/
      properties:
        unread_count:
          type: integer
          description: Total number of unread notifications for the current user.
        results:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
          description: Ordered list of notifications (newest first).
      required:
      - results
      - unread_count
    ParentProfile:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        parent:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
          description: The parent user (set automatically).
        child:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
          description: The linked student user.
      required:
      - child
      - id
      - parent
    ParentProfileRequest:
      type: object
      properties:
        child_id:
          type: integer
          writeOnly: true
          description: ID of the student to link to this parent account.
      required:
      - child_id
    ProfileUpdateRequest:
      type: object
      properties:
        first_name:
          type: string
          description: First name.
        last_name:
          type: string
          description: Last name.
        phone:
          type: string
          description: Phone number.
        avatar:
          type: string
          format: uri
          description: URL to avatar image.
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Unique username (letters, digits, @/./+/-/_ only).
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          description: Valid email address. Must be unique across the platform.
        password:
          type: string
          writeOnly: true
          minLength: 8
          description: Password (minimum 8 characters).
        role:
          allOf:
          - $ref: '#/components/schemas/RegisterRoleEnum'
          description: |-
            User role: student | teacher | parent | school_admin.

            * `student` - Student
            * `parent` - Parent
            * `teacher` - Teacher
            * `school_admin` - School Admin
      required:
      - email
      - password
      - role
      - username
    RegisterRoleEnum:
      enum:
      - student
      - parent
      - teacher
      - school_admin
      type: string
      description: |-
        * `student` - Student
        * `parent` - Parent
        * `teacher` - Teacher
        * `school_admin` - School Admin
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          format: uuid
          description: Reset token received by email.
        new_password:
          type: string
          writeOnly: true
          minLength: 8
          description: New password (minimum 8 characters).
      required:
      - new_password
      - token
    School:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        created_by:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
          description: School admin who created this school.
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by
      - id
      - name
      - slug
    SchoolCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          description: School name.
          maxLength: 255
      required:
      - name
    StudentAttendance:
      type: object
      properties:
        student_id:
          type: integer
          description: Student user ID.
        student_name:
          type: string
          description: Full name or username of the student.
        status:
          type: string
          nullable: true
          description: Attendance status or null if not marked.
      required:
      - status
      - student_id
      - student_name
    Submission:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique submission ID.
        assignment:
          type: integer
          readOnly: true
          description: ID of the assignment this submission belongs to.
        student:
          type: integer
          readOnly: true
          description: ID of the student who submitted.
        content:
          type: string
          description: The student's submitted work (text answer, link, or reference).
        status:
          allOf:
          - $ref: '#/components/schemas/SubmissionStatusEnum'
          readOnly: true
          description: |-
            Lifecycle status. `pending` = awaiting grade, `graded` = teacher has graded.

            * `pending` - Pending
            * `graded` - Graded
        submitted_at:
          type: string
          format: date-time
          readOnly: true
          description: Timestamp when the submission was received.
      required:
      - assignment
      - content
      - id
      - status
      - student
      - submitted_at
    SubmissionCreateRequest:
      type: object
      properties:
        content:
          type: string
          minLength: 1
          description: The student's answer or work. Plain text, a URL, or structured
            content.
          maxLength: 10000
      required:
      - content
    SubmissionStatusEnum:
      enum:
      - pending
      - graded
      type: string
      description: |-
        * `pending` - Pending
        * `graded` - Graded
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    TokenRefreshRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    UseCodeRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          description: Enrollment code token (UUID format, 36 characters).
      required:
      - code
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique user ID.
        username:
          type: string
          description: Unique username.
        email:
          type: string
          format: email
          description: User's email address.
        role:
          type: string
          description: 'Account role: student | teacher | parent | school_admin.'
        first_name:
          type: string
          description: First name.
        last_name:
          type: string
          description: Last name.
        phone:
          type: string
          description: Phone number (optional).
        avatar:
          type: string
          format: uri
          description: URL to profile avatar image (optional).
        date_joined:
          type: string
          format: date-time
          readOnly: true
          description: ISO-8601 timestamp of registration.
      required:
      - date_joined
      - email
      - id
      - role
      - username
    UserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Unique username.
        email:
          type: string
          format: email
          minLength: 1
          description: User's email address.
        role:
          type: string
          minLength: 1
          description: 'Account role: student | teacher | parent | school_admin.'
        first_name:
          type: string
          description: First name.
        last_name:
          type: string
          description: Last name.
        phone:
          type: string
          description: Phone number (optional).
        avatar:
          type: string
          format: uri
          description: URL to profile avatar image (optional).
      required:
      - email
      - role
      - username
    _BriefSchool:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
    _BriefUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - email
      - id
      - username
    _BriefUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
      required:
      - email
      - username
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT access token. Obtain it from `POST /api/v1/auth/login/`.
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
servers:
- url: https://edugrow.pythonanywhere.com
  description: Production server
- url: http://localhost:8000
  description: Local development server
tags:
- name: Auth
  description: Register, login, token refresh, profile
- name: Courses
  description: Course management and enrollment
- name: Lessons
  description: Course lesson content
- name: Assignments
  description: Assignments within courses
- name: Submissions
  description: Student assignment submissions
- name: Grades
  description: Submission grading and grade queries
- name: Attendance
  description: Daily attendance tracking
- name: Notifications
  description: In-app notification inbox
